name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test
    runs-on: windows-2025
    timeout-minutes: 20
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: true
      NUGET_XMLDOC_MODE: skip
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Verify repository policy
        shell: pwsh
        run: ./eng/verify-repository.ps1

      - name: Restore
        run: dotnet restore FocusLedger.slnx

      - name: Verify formatting
        run: dotnet format FocusLedger.slnx --no-restore --verify-no-changes

      - name: Build
        run: dotnet build FocusLedger.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test FocusLedger.slnx --configuration Release --no-build --logger "trx;LogFilePrefix=focusledger-tests" --results-directory artifacts/test-results

      - name: Sanitize test results
        id: sanitize-test-results
        if: always()
        shell: pwsh
        run: ./eng/sanitize-test-results.ps1 -ResultsDirectory ./artifacts/test-results

      - name: Upload test results
        if: ${{ always() && steps.sanitize-test-results.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ github.sha }}
          path: artifacts/test-results/**/*.trx
          if-no-files-found: warn
          retention-days: 7
